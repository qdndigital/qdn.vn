# QDN — Netlify deploy config
[build]
  # Tailwind is compiled on each deploy, so editing HTML + pushing is enough.
  command = "npx tailwindcss@3.4.17 -c tailwind.config.js -i src/input.css -o assets/qdn.css --minify"
  publish = "."

# Clean URLs: serve /services from services.html and redirect the .html form.
[build.processing.html]
  pretty_urls = true
